        type: "Consultant Guide",
        content: [
          { section: "Personal Statement — Final Check", questions: [
            "Read the essay aloud one final time. Does every word sound like this student?",
            "Is it between 600–650 words?",
            "Does it open with a scene or image — not a thesis or life summary?",
            "Does it end with forward momentum — not a summary of what was just written?",
            "Has it been checked for spelling, punctuation, and grammar in a fresh read?"

          { section: "Supplements — Final Check", questions: [

            "Are hours per week and weeks per year accurate and honest?"

          { section: "Recommendations — Final Check", questions: [
            "Have both teacher recommenders been formally asked and confirmed?",
            "Has the counselor recommendation been requested with a school report?",
            "Has the student waived their right to view recommendations?",
            "Has a thank-you note been sent to each recommender?",
            "Have recommenders been given: student résumé, school list, deadlines, and 2–3 story prompts?"
          ]},
          { section: "Application Details — Final Check", questions: [
            "Is the student's legal name spelled correctly and consistently across all applications?",
            "Are all demographic fields complete and accurate?",
            "Has the application been reviewed for any unanswered required fields?",
            "Has the student confirmed their intended major is listed correctly for each school?",
            "Has the correct high school, GPA, and transcript information been entered?"
          ]}
        ]
      },
      {
        title: "Scholarship Essay Strategy",
        type: "Discussion Guide",
        content: [
          { section: "Where to Find Scholarships", questions: [
            "SCHOOL-SPECIFIC: Every school on the list — check their financial aid and scholarship pages directly. Many are automatic with admission.",
            "FASTWEB.COM: Free database — have student create a profile and check weekly for new matches.",
            "SCHOLARSHIPS.COM: Similar to Fastweb — worth having profiles on both.",
            "LOCAL: Community foundation, church, employer-based (parents' employers often offer these), local civic organizations.",

          { section: "Scholarship Essay Strategy", questions: [

          { section: "Scholarship Application Priorities", questions: [
            "Apply to school-specific scholarships first — highest hit rate, least competition.",
            "Apply to local scholarships second — smaller pools, higher odds.",
            "Apply to national scholarships last — they're worth doing but most competitive.",
            "Set a goal: 10 scholarship applications by November 1.",
            "Track every application in a spreadsheet: scholarship name, amount, deadline, essay required, status."

      },
      {
        title: "Post-Submission Strategy & What Comes Next",
        type: "Student Worksheet",
        content: [

            "Do NOT call or email admissions offices repeatedly asking about your status — it does not help and can hurt."

          { section: "If You're Deferred from ED or EA", questions: [

            "Write a deferral letter (300–400 words) expressing continued strong interest and any new accomplishments since applying.",
            "Have Kari review the deferral letter before sending.",
            "Ask your counselor to send an updated transcript and a letter of support to the admissions office.",
            "Continue demonstrating interest — visit if possible, attend virtual events."
          ]},
          { section: "If You're Waitlisted", questions: [
            "Accept a spot on the waitlist only if you would genuinely attend if admitted.",
            "Send a waitlist letter of continued interest (400–500 words) — stronger than a deferral letter.",
            "Include any meaningful new achievements, awards, or recognitions since applying.",
            "Have Kari review before sending.",
            "Commit to your best option by May 1 and be genuinely at peace with it — waitlist outcomes are unpredictable."

          { section: "Comparing Financial Aid Offers (Spring)", questions: [

            "Calculate: Total Cost − Grants − Scholarships = Your actual out-of-pocket cost per year.",

            "If a school you prefer offers less aid than a comparable school — call the financial aid office and ask to have the offer reviewed. This works more often than families expect.",

          { section: "Celebrating the Journey", questions: [

            "Trust the process. Students who approach applications with honesty, specificity, and genuine self-reflection find the right fit.",
            "Kari is available through May 1 for any questions about decisions, financial aid appeals, or waitlist strategy.",

function SessionMaterials() {
  const [activeSession, setActiveSession] = useState(0);
  const [openMaterial, setOpenMaterial] = useState(null);
  const [openSection, setOpenSection] = useState({});

  const session = sessions[activeSession];

  const toggleSection = (matIdx, secIdx) => {
    const key = `${matIdx}-${secIdx}`;
    setOpenSection(prev => ({ ...prev, [key]: !prev[key] }));
  };

  const typeColors = {
    "Discussion Guide": "#2C4A7C",
    "Student Worksheet": "#1A3A2A",
    "Student Homework": "#6B3A2A",
    "Consultant Guide": "#5C3D7A",
  };

  return (
    <div style={{ fontFamily: "'Georgia', serif", background: "#0F1923", minHeight: "100vh", color: "#F0EBE3" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');
        * { box-sizing: border-box; }
        .sess-btn { cursor: pointer; transition: all 0.2s; border: none; }
        .sess-btn:hover { filter: brightness(1.1); }
        .mat-card { cursor: pointer; transition: all 0.2s; }
        .mat-card:hover { transform: translateY(-2px); }
        .sec-btn { cursor: pointer; transition: background 0.15s; }
        .sec-btn:hover { background: rgba(255,255,255,0.05) !important; }
        .fade-in { animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
      `}</style>

      {/* Top Nav */}
      <div style={{ background: "#0A1219", borderBottom: "1px solid rgba(255,255,255,0.08)", padding: "0 20px", overflowX: "auto" }}>
        <div style={{ display: "flex", maxWidth: 900, margin: "0 auto", gap: 0 }}>
          {sessions.map((s, i) => (
            <button
              key={i}
              className="sess-btn"
              onClick={() => { setActiveSession(i); setOpenMaterial(null); setOpenSection({}); }}
              style={{
                background: "none",
                color: activeSession === i ? "#fff" : "rgba(255,255,255,0.45)",
                padding: "16px 14px",
                fontSize: 12,
                fontFamily: "'DM Sans', sans-serif",
                fontWeight: activeSession === i ? 600 : 400,
                borderBottom: activeSession === i ? `2px solid ${s.color === "#2C4A7C" ? "#6B9FE0" : s.color === "#6B3A2A" ? "#E0956B" : s.color === "#1A3A2A" ? "#6BE0A0" : s.color === "#5C3D7A" ? "#B06BE0" : s.color === "#7A5C1A" ? "#E0C06B" : "#6BE0E0"}` : "2px solid transparent",
                whiteSpace: "nowrap",
                cursor: "pointer",
                letterSpacing: 0.3
              }}
            >
              {s.icon} S{s.id}
            </button>
          ))}
        </div>
      </div>

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "28px 16px" }}>

        {/* Session Header */}
        <div className="fade-in" style={{ marginBottom: 28 }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
            <div>
              <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: "rgba(255,255,255,0.4)", margin: "0 0 6px" }}>
                {session.session} · {session.duration}
              </p>
              <h1 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "clamp(24px, 5vw, 38px)", margin: "0 0 6px", fontWeight: 600, lineHeight: 1.2 }}>
                {session.icon} {session.title}
              </h1>
              <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: "rgba(255,255,255,0.55)", margin: 0 }}>
                <strong style={{ color: "rgba(255,255,255,0.8)" }}>Goal:</strong> {session.goal}
              </p>
            </div>
          </div>

          {/* Agenda */}
          <div style={{ marginTop: 20, background: "rgba(255,255,255,0.04)", borderRadius: 12, padding: "16px 20px", border: "1px solid rgba(255,255,255,0.08)" }}>
            <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: "rgba(255,255,255,0.4)", margin: "0 0 10px" }}>Session Agenda</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {session.agenda.map((item, i) => (
                <span key={i} style={{
                  fontFamily: "'DM Sans', sans-serif", fontSize: 12,
                  background: "rgba(255,255,255,0.07)", padding: "4px 12px",
                  borderRadius: 20, color: "rgba(255,255,255,0.7)"
                }}>
                  <span style={{ opacity: 0.5, marginRight: 4 }}>{i + 1}.</span>{item}
                </span>
              ))}
            </div>
          </div>
        </div>

        {/* Materials */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 14, marginBottom: 24 }}>
          {session.materials.map((mat, mi) => (
            <div
              key={mi}
              className="mat-card fade-in"
              onClick={() => setOpenMaterial(openMaterial === mi ? null : mi)}
              style={{
                background: openMaterial === mi ? "rgba(255,255,255,0.08)" : "rgba(255,255,255,0.04)",
                border: `1px solid ${openMaterial === mi ? "rgba(255,255,255,0.2)" : "rgba(255,255,255,0.08)"}`,
                borderRadius: 12, padding: "18px 20px"
              }}
            >
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <span style={{
                    fontFamily: "'DM Sans', sans-serif", fontSize: 10, letterSpacing: 1.5,
                    textTransform: "uppercase", padding: "2px 8px", borderRadius: 4,
                    background: `${typeColors[mat.type] || "#444"}33`,
                    color: typeColors[mat.type] || "#aaa", display: "inline-block", marginBottom: 8
                  }}>{mat.type}</span>
                  <h3 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 18, fontWeight: 600, margin: "0 0 4px", lineHeight: 1.3 }}>
                    {mat.title}
                  </h3>
                  <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "rgba(255,255,255,0.4)", margin: 0 }}>
                    {mat.content.length} sections
                  </p>
                </div>
                <span style={{ fontSize: 18, opacity: 0.4, marginLeft: 8 }}>{openMaterial === mi ? "▲" : "▼"}</span>
              </div>
            </div>
          ))}
        </div>

        {/* Expanded Material */}
        {openMaterial !== null && (
          <div className="fade-in" style={{
            background: "rgba(255,255,255,0.03)", borderRadius: 14,
            border: "1px solid rgba(255,255,255,0.1)", overflow: "hidden", marginBottom: 24
          }}>
            <div style={{ padding: "18px 22px", borderBottom: "1px solid rgba(255,255,255,0.07)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, letterSpacing: 2, textTransform: "uppercase", color: "rgba(255,255,255,0.35)", margin: "0 0 4px" }}>
                  {session.materials[openMaterial].type}
                </p>
                <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 22, fontWeight: 600, margin: 0 }}>
                  {session.materials[openMaterial].title}
                </h2>
              </div>
              <button onClick={() => setOpenMaterial(null)} style={{ background: "rgba(255,255,255,0.07)", border: "none", color: "rgba(255,255,255,0.5)", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 12 }}>
                Close ✕
              </button>
            </div>

            {session.materials[openMaterial].content.map((sec, si) => {
              const secKey = `${openMaterial}-${si}`;
              const isSecOpen = openSection[secKey] !== false; // default open
              return (
                <div key={si} style={{ borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                  <div
                    className="sec-btn"
                    onClick={() => toggleSection(openMaterial, si)}
                    style={{ padding: "14px 22px", display: "flex", justifyContent: "space-between", alignItems: "center" }}
                  >
                    <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 600, letterSpacing: 1, textTransform: "uppercase", color: "rgba(255,255,255,0.6)", margin: 0 }}>
                      {sec.section}
                    </p>
                    <span style={{ fontSize: 12, color: "rgba(255,255,255,0.3)" }}>{isSecOpen ? "▲" : "▼"}</span>
                  </div>
                  {isSecOpen && (
                    <div style={{ padding: "0 22px 16px" }}>
                      {sec.questions.map((q, qi) => (
                        <div key={qi} style={{
                          padding: "10px 14px", marginBottom: 6,
                          background: "rgba(255,255,255,0.03)", borderRadius: 8,
                          borderLeft: `2px solid rgba(255,255,255,0.1)`
                        }}>
                          <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "rgba(255,255,255,0.75)", margin: 0, lineHeight: 1.6 }}>
                            {q}
                          </p>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* Footer */}
        <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "rgba(255,255,255,0.25)", textAlign: "center" }}>
          Kari Ursu · College Admissions Consulting · kariursu8@gmail.com
        </p>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(SessionMaterials));
</script>
</body>
</html>
